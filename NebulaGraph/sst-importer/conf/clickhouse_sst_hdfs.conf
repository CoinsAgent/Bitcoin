# Nebula Exchange v3.8 SST config for the VID-only Bitcoin graph.
#
# Flow:
#   ClickHouse -> Spark/Exchange -> HDFS SST path -> Console DOWNLOAD/INGEST -> storaged
#
# Before running, change:
#   - nebula.path.remote and nebula.path.hdfs.namenode
#   - all three ClickHouse JDBC urls if Spark cannot reach 192.168.2.241:8123
#   - the YYYYMM partition filter in each query

{
  spark: {
    app: {
      name: Bitcoin ClickHouse to NebulaGraph SST
    }
  }

  nebula: {
    address: {
      graph: ["graphd:9669"]
      meta: ["metad0:9559", "metad1:9559", "metad2:9559"]
    }
    user: root
    pswd: nebula
    space: bitcoin

    path: {
      local: "/tmp/nebula-exchange-sst"
      remote: "/bitcoin/sst/202601"
      hdfs.namenode: "hdfs://name_node:9000"
    }

    connection: {
      timeout: 30000
    }

    error: {
      max: 32
      output: "/tmp/nebula-exchange-errors"
    }

    rate: {
      limit: 1024
      timeout: 1000
    }
  }

  tags: [
    {
      name: tx
      type: {
        source: clickhouse
        sink: sst
      }
      url: "jdbc:clickhouse://192.168.2.241:8123/bitcoin"
      user: "default"
      password: ""
      numPartition: "32"
      sentence: """
        SELECT
          concat('tx:', txid) AS vid,
          txid,
          `hash`,
          block_hash,
          toInt64(block_height) AS block_height,
          toInt64(block_time) AS block_time
        FROM bitcoin.transactions FINAL
        WHERE transaction_month = 202601
          AND txid != ''
      """
      fields: [txid, hash, block_hash, block_height, block_time]
      nebula.fields: [txid, hash, block_hash, block_height, block_time]
      vertex: {
        field: vid
      }
      batch: 10000
      partition: 256
      repartitionWithNebula: true
    }
  ]

  edges: [
    {
      name: input_to_tx
      type: {
        source: clickhouse
        sink: sst
      }
      url: "jdbc:clickhouse://192.168.2.241:8123/bitcoin"
      user: "default"
      password: ""
      numPartition: "32"
      sentence: """
        SELECT
          concat('addr:', address) AS src,
          concat('tx:', txid) AS dst,
          toInt64(source_index) AS rank,
          txid,
          toInt64(source_index) AS input_index,
          utxo_txid,
          toInt64(utxo_vout) AS utxo_vout,
          toFloat64(value) AS value
        FROM bitcoin.addresses FINAL
        WHERE address_month = 202601
          AND direction = 'input'
          AND address != ''
          AND txid != ''
          AND utxo_txid != ''
      """
      fields: [txid, input_index, utxo_txid, utxo_vout, value]
      nebula.fields: [txid, input_index, utxo_txid, utxo_vout, value]
      source: {
        field: src
      }
      target: {
        field: dst
      }
      ranking: rank
      batch: 10000
      partition: 256
      repartitionWithNebula: true
    }
    {
      name: tx_to_output
      type: {
        source: clickhouse
        sink: sst
      }
      url: "jdbc:clickhouse://192.168.2.241:8123/bitcoin"
      user: "default"
      password: ""
      numPartition: "32"
      sentence: """
        SELECT
          concat('tx:', txid) AS src,
          concat('addr:', address) AS dst,
          toInt64(utxo_vout) AS rank,
          txid AS utxo_txid,
          toInt64(utxo_vout) AS utxo_vout,
          toFloat64(value) AS value
        FROM bitcoin.addresses FINAL
        WHERE address_month = 202601
          AND direction = 'output'
          AND address != ''
          AND txid != ''
      """
      fields: [utxo_txid, utxo_vout, value]
      nebula.fields: [utxo_txid, utxo_vout, value]
      source: {
        field: src
      }
      target: {
        field: dst
      }
      ranking: rank
      batch: 10000
      partition: 256
      repartitionWithNebula: true
    }
  ]
}
