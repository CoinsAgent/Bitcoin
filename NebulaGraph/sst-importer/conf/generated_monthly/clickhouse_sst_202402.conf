# Host-local runtime config for generating NebulaGraph SST files from ClickHouse.
# This writes SST files to /home/btc/nebula_sst_clickhouse/sst_output.

{
  spark: {
    app: {
      name: Bitcoin ClickHouse to NebulaGraph SST 202402
    }
    master: "local[4]"
    executor: {
      memory: 8g
    }
    cores: {
      max: 4
    }
  }

  nebula: {
    address: {
      graph: ["127.0.0.1:9669"]
      meta: ["172.20.0.2:9559", "172.20.0.3:9559", "172.20.0.4:9559"]
    }
    user: root
    pswd: nebula
    space: bitcoin

    path: {
      local: "/home/btc/nebula_sst_clickhouse/sst_output"
      remote: "/home/btc/nebula_sst_clickhouse/sst_output"
    }

    connection: {
      timeout: 30000
      retry: 3
    }
    execution: {
      retry: 3
    }
    error: {
      max: 32
      output: "/home/btc/nebula_sst_clickhouse/errors"
    }
    rate: {
      limit: 1024
      timeout: 1000
    }
  }

  tags: [
    {
      name: tx
      type: {
        source: clickhouse
        sink: sst
      }
      url: "jdbc:clickhouse://192.168.2.241:8123/bitcoin"
      user: "default"
      password: ""
      numPartition: "32"
      sentence: """
        SELECT
          concat('tx:', txid) AS vid,
          txid,
          `hash`,
          block_hash,
          toInt64(block_height) AS block_height,
          toInt64(block_time) AS block_time
        FROM bitcoin.transactions FINAL
        WHERE transaction_month = 202402
          AND txid != ''
      """
      fields: [txid, hash, block_hash, block_height, block_time]
      nebula.fields: [txid, hash, block_hash, block_height, block_time]
      vertex: {
        field: vid
      }
      batch: 10000
      partition: 256
      repartitionWithNebula: true
    }
  ]

  edges: [
    {
      name: input_to_tx
      type: {
        source: clickhouse
        sink: sst
      }
      url: "jdbc:clickhouse://192.168.2.241:8123/bitcoin"
      user: "default"
      password: ""
      numPartition: "32"
      sentence: """
        SELECT
          concat('addr:', address) AS src,
          concat('tx:', txid) AS dst,
          toInt64(source_index) AS rank,
          txid,
          toInt64(source_index) AS input_index,
          utxo_txid,
          toInt64(utxo_vout) AS utxo_vout,
          toFloat64(value) AS value
        FROM bitcoin.addresses FINAL
        WHERE address_month = 202402
          AND direction = 'input'
          AND address != ''
          AND txid != ''
          AND utxo_txid != ''
      """
      fields: [txid, input_index, utxo_txid, utxo_vout, value]
      nebula.fields: [txid, input_index, utxo_txid, utxo_vout, value]
      source: {
        field: src
      }
      target: {
        field: dst
      }
      ranking: rank
      batch: 10000
      partition: 256
      repartitionWithNebula: true
    }
    {
      name: tx_to_output
      type: {
        source: clickhouse
        sink: sst
      }
      url: "jdbc:clickhouse://192.168.2.241:8123/bitcoin"
      user: "default"
      password: ""
      numPartition: "32"
      sentence: """
        SELECT
          concat('tx:', txid) AS src,
          concat('addr:', address) AS dst,
          toInt64(utxo_vout) AS rank,
          txid AS utxo_txid,
          toInt64(utxo_vout) AS utxo_vout,
          toFloat64(value) AS value
        FROM bitcoin.addresses FINAL
        WHERE address_month = 202402
          AND direction = 'output'
          AND address != ''
          AND txid != ''
      """
      fields: [utxo_txid, utxo_vout, value]
      nebula.fields: [utxo_txid, utxo_vout, value]
      source: {
        field: src
      }
      target: {
        field: dst
      }
      ranking: rank
      batch: 10000
      partition: 256
      repartitionWithNebula: true
    }
  ]
}
