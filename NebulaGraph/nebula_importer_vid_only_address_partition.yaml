# Nebula Importer v3 config for the VID-only Bitcoin address graph.
#
# This imports one exported UTC YYYYMM partition. The exporter writes an
# equivalent bitcoin_import.yaml inside each partition directory.
#
# Docker Compose usage from NebulaGraph/docker-compose:
#   BITCOIN_IMPORT_PARTITION=202601 docker compose --profile tools run --rm bitcoin-importer
#
# Expected mount:
#   host ../../nebula_csv -> container /importer
#
# Expected CSV files:
#   /importer/202601/tx_vertices.csv
#   /importer/202601/input_to_tx_edges.csv
#   /importer/202601/tx_to_output_edges.csv

client:
  version: v3
  address: graphd:9669
  user: root
  password: nebula
  retry: 3
  concurrencyPerAddress: 4
  reconnectInitialInterval: 1s
  retryInitialInterval: 1s

manager:
  spaceName: bitcoin
  batch: 10000
  readerConcurrency: 2
  importerConcurrency: 8
  statsInterval: 10s

log:
  level: INFO
  console: true
  files:
    - /importer/202601/nebula-importer.log

sources:
  - path: /importer/202601/tx_vertices.csv
    batch: 10000
    csv:
      withHeader: true
    tags:
      - name: tx
        id:
          type: STRING
          index: 0
        props:
          - name: txid
            type: STRING
            index: 1
          - name: hash
            type: STRING
            index: 2
          - name: block_hash
            type: STRING
            index: 3
          - name: block_height
            type: INT
            index: 4
          - name: block_time
            type: INT
            index: 5

  - path: /importer/202601/input_to_tx_edges.csv
    batch: 10000
    csv:
      withHeader: true
    edges:
      - name: input_to_tx
        src:
          id:
            type: STRING
            index: 0
        dst:
          id:
            type: STRING
            index: 1
        rank:
          index: 2
        props:
          - name: txid
            type: STRING
            index: 3
          - name: input_index
            type: INT
            index: 4
          - name: utxo_txid
            type: STRING
            index: 5
          - name: utxo_vout
            type: INT
            index: 6
          - name: value
            type: DOUBLE
            index: 7

  - path: /importer/202601/tx_to_output_edges.csv
    batch: 10000
    csv:
      withHeader: true
    edges:
      - name: tx_to_output
        src:
          id:
            type: STRING
            index: 0
        dst:
          id:
            type: STRING
            index: 1
        rank:
          index: 2
        props:
          - name: utxo_txid
            type: STRING
            index: 3
          - name: utxo_vout
            type: INT
            index: 4
          - name: value
            type: DOUBLE
            index: 5
